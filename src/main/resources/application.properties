spring.application.name=nova-backend
spring.profiles.active=local

# === DATABASE (Neon.tech PostgreSQL 17) ===
spring.datasource.url=jdbc:postgresql://ep-cold-morning-agc9fz07-pooler.c-2.eu-central-1.aws.neon.tech/Gestione_Ordini?sslmode=require&channelBinding=require

# === JPA / HIBERNATE ===
# Usare 'update' in sviluppo, 'validate' in produzione
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Best practice: disabilita open-in-view per evitare lazy loading fuori dalla transazione
spring.jpa.open-in-view=false

# === SERVER ===
server.port=8080

# === SPRING MVC ===
# Abilita risposta degli errori REST in formato RFC 7807 (Problem Details)
spring.mvc.problem-details.enabled=true

# === LOGGING ===
logging.level.com.nova.backend=INFO
logging.level.org.hibernate.SQL=WARN

# === SECURITY CORS ===
cors.allowed-origins=http://localhost:4200

# === JWT ===
# ATTENZIONE: sostituire il secret con un valore sicuro tramite variabile d'ambiente in produzione
jwt.secret=dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLW5vdmEtYmFja2VuZA==
jwt.expiration=86400000
